name: Generate Android Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate release keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          keytool -genkeypair \
            -keystore kaderin-sesi-release.jks \
            -storetype JKS \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keypass "$KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 10000 \
            -dname "CN=Kaderin Sesi, O=Kaderin Sesi, C=TR"
          base64 -w 0 kaderin-sesi-release.jks > keystore-base64.txt

      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: kaderin-sesi-release-keystore
          path: kaderin-sesi-release.jks
          retention-days: 1
          if-no-files-found: error

      - name: Upload encoded keystore
        uses: actions/upload-artifact@v4
        with:
          name: kaderin-sesi-keystore-base64
          path: keystore-base64.txt
          retention-days: 1
          if-no-files-found: error